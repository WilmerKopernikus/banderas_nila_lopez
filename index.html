<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banderas Nila López</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="stylesheet" href="header.css" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
</head>
<body>
  <form
    name="contacto"
    method="POST"
    data-netlify="true"
    netlify-honeypot="bot-field"
    aria-hidden="true"
    tabindex="-1"
    style="display:none !important; visibility:hidden; position:absolute; left:-9999px; width:0; height:0; overflow:hidden;"
  >
    <input type="hidden" name="form-name" value="contacto" />
    <input type="text" name="bot-field" />
    <input type="text" name="name" />
    <input type="email" name="email" />
    <textarea name="message"></textarea>
  </form>

  <div id="app">
    <header-component :language="language"></header-component>
    <hero-component :language="language"></hero-component>
  
    <courses-component v-if="showCourses" :language="language"></courses-component>
    <locations-component v-if="showLocations" :language="language"></locations-component>
    <about-component v-if="showAbout" :language="language"></about-component>
    <testimonials-component v-if="showTestimonials" :language="language"></testimonials-component>
    <contact-component :language="language"></contact-component>
    <footer-component v-if="showFooter" :language="language"></footer-component>
  </div>

  <script src="components/headerComponent.js"></script>
  <script src="components/heroComponent.js"></script>
  <script src="components/coursesComponent.js"></script>
  <script src="components/locationsComponent.js"></script>
  <script src="components/aboutComponent.js"></script>
  <script src="components/testimonialsComponent.js"></script>
  <script src="components/contactComponent.js"></script>
  <script src="components/footerComponent.js"></script>
  <script src="main.js"></script>
</body>
</html>
